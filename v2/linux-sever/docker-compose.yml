version: '3.8'

services:
  taskpyro-node:
    image: crpi-7ub5pdu5y0ps1uyh.cn-hangzhou.personal.cr.aliyuncs.com/taskpyro/taskpyro-node:latest
    container_name: taskpyro-node
    ports:
      - "${SERVER_PORT}:${SERVER_PORT}"
    volumes:
      - ./data:/app/data
      - ./data/static:/app/static
      - ./data/logs:/app/logs
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${SERVER_PORT}/verify"]
      interval: 60s
      timeout: 20s
      retries: 3